    <span>.</span>
    <span>.</span>
    <!--não funcionou a largura, porque o span é inline por padrão-->
    <hr>
    <!--funcionou,porque ele deixou de ser inline e se tornou inline-block-->

    <div class="block">4</div>
    <div class="inline">5</div>

    <div class="nenhuma">misteriosa</div> <!--none some, hidden esconde-->
