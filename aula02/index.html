<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="username">Nome</label>
        <input name="username" type="text" placeholder="Insira seu nome">

        <label for="email">Email</label>
        <input name="email" type="email" placeholder="Insira seu email">

        <label for="password">Senha</label>
        <input name="password" type="password" placeholder="Insira sua senha">

        <label for="interesse">Interesses</label>
        <input name="interesse" type="checkbox" id="" value="html">HTML
        <input name="interesse" type="checkbox" id="" value="html">CSS
        <input name="interesse" type="checkbox" id="" value="html">JS

        <label for="genero">Genero</label>
        <input type="radio" name="genero" id="" value="masculino">Masculino
        <input type="radio" name="genero" id="" value="feminino">Feminino
        <input type="radio" name="genero" id="" value="nao-binario">Não Binário
        <input type="radio" name="genero" id="" value="nao-informado">Prefiro não informar

        <label for="curso">Curso</label>
        <select name="curso" id="">
            <option value="javascript">JavaScript</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
        </select>

        <label for="comentario">Comentario</label>
        <textarea name="comentario" id="" cols="30" rows="10" placeholder="Insira seu comentario"></textarea>

        <button type="submit">Enviar</button>

    </form>
</body>
</html>
